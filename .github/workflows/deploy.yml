name: Deploy to Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Write API production config
        run: |
          cat > Ballers.API/appsettings.Production.json << 'EOF'
          {
            "ConnectionStrings": {
              "Default": "Server=p4476.fra1.stableserver.net;Database=bradley5_ballers;User Id=bradley5;Password=Marvel1991!;TrustServerCertificate=True;"
            },
            "Cors": {
              "AllowedOrigins": ["https://bristonlyfans.co.uk", "https://www.bristonlyfans.co.uk"]
            },
            "AdminSeedPassword": "CHANGE_ME"
          }
          EOF

      - name: Publish API
        run: dotnet publish Ballers.API/Ballers.API.csproj -c Release -o publish/api --nologo --self-contained true -r win-x64

      - name: Set Blazor API URL for production
        run: echo '{"ApiBaseUrl":"https://api.bristonlyfans.co.uk/"}' > Ballers/wwwroot/appsettings.json

      - name: Publish Blazor
        run: dotnet publish Ballers/Ballers.csproj -c Release -o publish/blazor --nologo

      # Take the API offline so IIS releases the file locks before we overwrite the DLLs
      - name: Take API offline
        run: |
          echo "<html><body>Deploying update, back in a moment...</body></html>" | \
          curl --ssl-reqd --insecure -T - \
            "ftp://bristonlyfans.co.uk/api.bristonlyfans.co.uk/app_offline.htm" \
            -u "bradley5:8TPwRdv_e_b3jw9t"
          sleep 5

      - name: Deploy API via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: bristonlyfans.co.uk
          username: bradley5
          password: "8TPwRdv_e_b3jw9t"
          protocol: ftps
          security: loose
          local-dir: publish/api/
          server-dir: /api.bristonlyfans.co.uk/

      # Remove app_offline.htm to bring the API back online
      - name: Bring API back online
        run: |
          curl --ssl-reqd --insecure \
            "ftp://bristonlyfans.co.uk" \
            -u "bradley5:8TPwRdv_e_b3jw9t" \
            -Q "DELE /api.bristonlyfans.co.uk/app_offline.htm"

      - name: Deploy Blazor via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: bristonlyfans.co.uk
          username: bradley5
          password: "8TPwRdv_e_b3jw9t"
          protocol: ftps
          security: loose
          local-dir: publish/blazor/wwwroot/
          server-dir: /bristonlyfans.co.uk/wwwroot/
          dangerous-clean-slate: true
